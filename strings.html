<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Palindrome Checker</title>
    
    <style>
        /* Creative Element 1: Custom typography imported via Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        /* Creative Element 2: Vibrant linear gradient background and responsive centering framework */
        body {
            /* Establish font family styling using Poppins with a clean sans-serif fallback */
            font-family: 'Poppins', sans-serif;
            /* Apply a smooth, modern background gradient across the screen canvas */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* Stretch the body height to fit the full viewport height boundaries */
            min-height: 100vh;
            /* Wipe out default browser edge margins for a flush look */
            margin: 0;
            /* Turn on flexbox container model to align application pieces easily */
            display: flex;
            /* Vertically center the content card directly in the middle of the screen */
            align-items: center;
            /* Horizontally center the content card directly in the middle of the screen */
            justify-content: center;
        }

        /* Design parameters for the main interactive visual card component wrapper */
        .checker-card {
            /* Give the UI element card a crisp solid white background layer */
            background-color: #ffffff;
            /* Pad the internal content safely away from the card component borders */
            padding: 40px;
            /* Soften layout card corners with a modern border radius setting */
            border-radius: 16px;
            /* Produce a deep floating shadow layer underneath the app interface area */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            /* Constrain width boundaries so elements do not warp on wide screens */
            max-width: 460px;
            /* Allow flexible shrinkage while holding structural size scaling rules */
            width: 100%;
            /* Center-align text headers inside the block area */
            text-align: center;
        }

        /* Header element textual styling modifications */
        h1 {
            /* Give headings a distinct, commanding purple tone to establish contrast */
            color: #764ba2;
            /* Drop top margin limits to keep element structure tight and uniform */
            margin-top: 0;
        }

        /* Stylized user input data field modifications */
        input[type="text"] {
            /* Force the input component container to span the entire form area width */
            width: 100%;
            /* Inject padding internally so typed elements do not scrape text walls */
            padding: 14px;
            /* Separate input layer items vertically away from text lines */
            margin: 18px 0;
            /* Render a smooth boundary frame line around input box states */
            border: 2px solid #e2e8f0;
            /* Give input field corners a sleek, rounded curve aesthetic */
            border-radius: 8px;
            /* Prevent structural padding changes from breaking component widths */
            box-sizing: border-box;
            /* Raise text sizes to make user entries clear and legible */
            font-size: 16px;
        }

        /* Modern styled form submission button configurations */
        button {
            /* Match button backgrounds to the main purple theme color */
            background-color: #764ba2;
            /* Set text color to white for contrast */
            color: white;
            /* Remove blocky system button outlines */
            border: none;
            /* Pad button internals for a taller clickable area */
            padding: 14px;
            /* Elevate structural text font sizes */
            font-size: 16px;
            /* Use semi-bold font weights to separate commands from regular text */
            font-weight: 600;
            /* Apply consistent border curving traits matching style inputs */
            border-radius: 8px;
            /* Alter crosshair icons to pointer indicators to reflect click readiness */
            cursor: pointer;
            /* Match form element input sizes exactly */
            width: 100%;
        }

        /* Mouse hover interaction styling changes for form submission button */
        button:hover {
            /* Deepen background tone shades slightly when users hover over buttons */
            background-color: #5a3284;
        }

        /* Layout wrapper zone designed for dynamic feedback and text evaluation displays */
        #resultDisplay {
            /* Separate display blocks cleanly from button areas above them */
            margin-top: 25px;
            /* Maximize visual response readout fonts */
            font-size: 18px;
            /* Apply bold attributes to focus reader attention instantly */
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="checker-card">
        <h1>Palindrome Checker</h1>
        <p>Enter a word or phrase below to test if it reads the same forward and backward.</p>

        <form id="palindromeForm" action="javascript:void(0);" onsubmit="executeLoopCycle();">
            <label id="inputLabel" for="userInput">Enter text:</label>
            <input type="text" id="userInput" required placeholder="e.g., Radar or Racecar">
            <button type="submit" id="submitBtn">Check Phrase</button>
        </form>

        <div id="resultDisplay"></div>
    </div>

    <script>
        // Program state tracking flag to monitor whether we are parsing words or waiting for loop choice confirmation
        var loopDecisionPhase = false;

        // Core controller driving form lifecycle loops without breaking required architecture rules
        function executeLoopCycle() {
            // Retrieve a reference point targeting text input DOM elements
            var inputField = document.getElementById("userInput");
            // Retrieve a reference point targeting dynamic readout text blocks
            var displayOutput = document.getElementById("resultDisplay");
            // Retrieve a reference point targeting form submit buttons
            var actionButton = document.getElementById("submitBtn");
            // Retrieve a reference point targeting instructions tracking tags
            var systemLabel = document.getElementById("inputLabel");

            // Evaluate conditional branch: Are we verifying structural words or tracking exit confirmation prompts?
            if (loopDecisionPhase === false) {
                // Read original string inputs from text fields safely
                var originalText = inputField.value;
                
                // Form safety validation check: Block entries containing only blank whitespaces
                if (originalText.trim() === "") {
                    // Update innerHTML block with stylized hazard validation indicators
                    displayOutput.innerHTML = "<span style='color: #e53e3e;'>Error: Please write something before checking!</span>";
                    // Exit out early to cease function parsing actions
                    return;
                }

                // Requirement: Remove spaces using regex and normalize capitalization layers completely
                var cleanedText = originalText.replace(/\s+/g, '').toLowerCase();
                // Flip extracted strings by building arrays, reversing lists, and re-binding fragments back
                var reversedText = cleanedText.split('').reverse().join('');

                // Check condition parameters: Does forward content text line match backward reversed patterns?
                if (cleanedText === reversedText) {
                    // Requirement: Inject clean confirmation text outputs via innerHTML controls
                    displayOutput.innerHTML = "<span style='color: #38a169;'>✔ \"" + originalText + "\" is a palindrome!</span>";
                } else {
                    // Requirement: Inject failure alert validation text patterns via innerHTML controls
                    displayOutput.innerHTML = "<span style='color: #e53e3e;'>✘ \"" + originalText + "\" is NOT a palindrome.</span>";
                }

                // Flip evaluation logic states to start checking for loop restart prompts on subsequent submissions
                loopDecisionPhase = true;
                // Wipe form text areas blank to prepare for the choice entry step
                inputField.value = "";
                // Rewrite labels to present the loop continuation option clearly to the user
                systemLabel.innerHTML = "Do you want to enter another word? (yes/no):";
                // Swap placeholder notes to direct users on selection inputs
                inputField.placeholder = "type 'yes' or 'no'";
                // Mutate button actions visually to direct structural response tasks
                actionButton.innerHTML = "Submit Choice";

            } else {
                // Extract decision strings and wipe trailing blanks while converting to lower cases
                var userResponse = inputField.value.trim().toLowerCase();

                // Branch verification block path: Handle 'yes' responses indicating loop retention
                if (userResponse === 'yes') {
                    // Turn off response flag settings to allow standard word parsing arrays again
                    loopDecisionPhase = false;
                    // Wipe form field text entries clean
                    inputField.value = "";
                    // Revert text indicators back to regular input guidelines
                    systemLabel.innerHTML = "Enter text:";
                    // Put original text placeholder instructions back into form properties
                    inputField.placeholder = "e.g., Radar or Racecar";
                    // Restore primary action execution verbiage onto buttons
                    actionButton.innerHTML = "Check Phrase";
                    // Completely clear existing evaluation readout layers
                    displayOutput.innerHTML = "";
                } 
                // Branch verification block path: Handle 'no' selections indicating a program exit action
                else if (userResponse === 'no') {
                    // Break loop cycle execution pipelines completely by closing operation flags
                    loopDecisionPhase = false;
                    // Output session closure indicators using innerHTML parameters securely
                    displayOutput.innerHTML = "<span style='color: #4a5568;'>Application closed. Thank you!</span>";
                    // Freeze text entry configurations completely to lock downstream processes
                    inputField.disabled = true;
                    // Lock actionable command buttons to prevent accidental restarts
                    actionButton.disabled = true;
                    // Set final static label tracking message
                    systemLabel.innerHTML = "Session Completed.";
                    // Clear out placeholder values completely
                    inputField.placeholder = "";
                } 
                // Catch-all branch safety validator handler logic dealing with corrupted/incorrect inputs
                else {
                    // Alert users via innerHTML updates regarding structural parameters required by input boundaries
                    displayOutput.innerHTML = "<span style='color: #dd6b20;'>Invalid choice! Please type exactly 'yes' or 'no'.</span>";
                    // Empty the erroneous string out of form inputs to prompt a retry loop pass
                    inputField.value = "";
                }
            }
        }
    </script>
</body>
</html>
