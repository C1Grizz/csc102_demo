<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome & String Analyzer</title>

    <style>
        /* Style the overall page body */
        body {
            /* Set a deep dark blue/slate background color */
            background-color: #0f172a;
            /* Use clean sans-serif font family */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Default text color to soft off-white */
            color: #f8fafc;
            /* Center content horizontally and vertically using Flexbox */
            display: flex;
            /* Center items along the main axis */
            justify-content: center;
            /* Center items along the cross axis */
            align-items: center;
            /* Set total height to 100% of the browser viewport */
            height: 100vh;
            /* Remove default browser margins */
            margin: 0;
        }

        /* Style the main visual container card */
        .container {
            /* Set a slightly lighter dark-blue background */
            background-color: #1e293b;
            /* Add padding around the interior content */
            padding: 35px;
            /* Smoothly round the corners */
            border-radius: 16px;
            /* Apply a subtle drop shadow for depth */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            /* Restrict the maximum width for optimal readability */
            max-width: 450px;
            /* Ensure container takes full available width up to max */
            width: 100%;
            /* Center all internal text */
            text-align: center;
        }

        /* Style the main heading */
        h1 {
            /* Add creative vibrant cyan text color */
            color: #38bdf8;
            /* Remove top margin */
            margin-top: 0;
        }

        /* Style the input text field */
        input[type="text"] {
            /* Make input span almost full width */
            width: 85%;
            /* Add comfortable interior padding */
            padding: 12px;
            /* Add spacing below the field */
            margin-bottom: 20px;
            /* Apply a clean border */
            border: 2px solid #334155;
            /* Round the input field edges */
            border-radius: 8px;
            /* Set background to a dark input box */
            background-color: #0f172a;
            /* Ensure input text is white */
            color: #ffffff;
            /* Set readable font size */
            font-size: 16px;
        }

        /* Style the submit button */
        button {
            /* Set a vibrant creative purple background */
            background-color: #818cf8;
            /* Make button text bold white */
            color: white;
            /* Remove borders */
            border: none;
            /* Add generous padding */
            padding: 12px 28px;
            /* Round the button corners */
            border-radius: 8px;
            /* Set bold font weight */
            font-weight: bold;
            /* Set readable font size */
            font-size: 16px;
            /* Change mouse cursor to pointer on hover */
            cursor: pointer;
        }

        /* Add interactive hover state to button */
        button:hover {
            /* Slightly darken background color when hovered */
            background-color: #6366f1;
        }

        /* Style the designated output message area */
        #outputArea {
            /* Add top margin to separate from form */
            margin-top: 25px;
            /* Slightly larger text for final results */
            font-size: 18px;
            /* Add slight line height for spacing */
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>String Analyzer</h1>
        <p>Enter any word or phrase to test if it is a palindrome:</p>

        <form id="analyzerForm">
            <input type="text" id="userInput" placeholder="Type here (e.g. racecar)...">
            <button type="submit">Analyze String</button>
        </form>

        <div id="outputArea"></div>
    </div>

    <script src="strings.js"></script>
</body>
</html>
